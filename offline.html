<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Offline • School Connect</title>
<style>
  body{font-family:system-ui,-apple-system,sans-serif;background:#0f172a;color:#fff;margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:24px}
  .box{max-width:420px}
  h1{font-size:1.6rem;margin:12px 0}
  p{color:#94a3b8;line-height:1.6}
  button{margin-top:18px;background:#4f46e5;color:#fff;border:none;padding:12px 24px;border-radius:10px;font-size:1rem;cursor:pointer}
</style>
</head>
<body>
  <div class="box">
    <div style="font-size:3rem">📡</div>
    <h1>You're offline</h1>
    <p>School Connect works offline for cached pages, but this page needs a connection.
       Reconnect to load the latest results, fees and messages, then try again.</p>
    <button onclick="location.reload()">Retry</button>
    <p style="margin-top:24px;font-size:.8rem">Powered by HMG Concepts</p>
  </div>
</body>
</html>
